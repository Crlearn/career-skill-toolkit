# ============================================================================
# 用户画像 (User Profile)
# 用途：所有 Skill 共享的用户上下文，避免重复追问基础信息
# 创建方式：对话开始时可选的 Intake 阶段填写，后续手动更新
# ============================================================================

# --- 基本信息 ---
name_or_alias: ""              # 姓名或昵称
current_stage: ""              # 应届/实习/社招/转行

# --- 教育背景 ---
education:
  school: ""                   # 学校
  degree: ""                   # 学历：博士/硕士/本科/大专
  major: ""                    # 专业
  graduation_year: ""          # 毕业年份（如 2026）

# --- 求职意向 ---
target_cities: []              # 目标城市列表，如 ["深圳", "广州"]
target_roles: []               # 目标岗位列表，如 ["Java后端开发", "AI应用实习"]
unavailable_roles: []          # 排除岗位，如 ["销售", "客服"]

# --- 硬性约束 ---
constraints:
  job_type: ""                 # 全职/实习/兼职
  availability: ""             # 最早到岗时间
  salary_floor: ""             # 薪资底线
  internship_duration: ""      # 实习时长（如适用）

# --- 偏好 ---
preferred_industries: []       # 偏好行业，如 ["互联网", "人工智能"]
preferred_company_size: ""     # 初创/中小/大厂/不限

# --- 风险备注 ---
risk_notes: []                 # 风险备注，如 ["gap year 需解释", "跨专业"]